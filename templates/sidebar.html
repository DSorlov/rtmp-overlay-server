<!--
  Sidebar Overlay Template
  Placeholders: {{name}}, {{title}}, {{logo}}
  Vertical sidebar on the left edge with name and title. Good for interviews or panel discussions.
  Elements hide automatically when their placeholder value is empty.
-->
<style>
  .sidebar {
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: linear-gradient(180deg, rgba(0, 0, 0, 0.9) 0%, rgba(20, 30, 50, 0.9) 100%);
    padding: 32px 20px;
    border-right: 3px solid #4fc3f7;
    border-radius: 0 8px 8px 0;
    min-width: 180px;
    gap: 16px;
    animation: sideSlide 0.5s ease-out;
  }

  .sidebar .side-logo {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #4fc3f7;
  }

  .sidebar .side-name {
    color: #ffffff;
    font-size: 26px;
    font-weight: 700;
    text-align: center;
    writing-mode: horizontal-tb;
    line-height: 1.2;
  }

  .sidebar .side-divider {
    width: 60%;
    height: 2px;
    background: rgba(79, 195, 247, 0.5);
  }

  .sidebar .side-title {
    color: #4fc3f7;
    font-size: 16px;
    font-weight: 500;
    text-align: center;
    line-height: 1.3;
  }

  @keyframes sideSlide {
    from { transform: translateY(-50%) translateX(-100%); opacity: 0; }
    to   { transform: translateY(-50%) translateX(0); opacity: 1; }
  }
</style>

<div class="sidebar" data-hide-when-children-empty>
  <img class="side-logo" data-placeholder="logo" data-hide-empty src="{{logo}}" alt="">
  <div class="side-name" data-placeholder="name" data-hide-empty>{{name}}</div>
  <div class="side-divider"></div>
  <div class="side-title" data-placeholder="title" data-hide-empty>{{title}}</div>
</div>
