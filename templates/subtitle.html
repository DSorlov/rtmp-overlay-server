<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
  }

  #subtitle-display {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    max-width: 80%;
    text-align: center;
    z-index: 10000;
  }

  .subtitle-line {
    display: block;
    background: rgba(0, 0, 0, 0.75);
    color: #FFFFFF;
    font-family: 'Arial', 'Helvetica Neue', sans-serif;
    font-size: 28px;
    font-weight: 600;
    line-height: 1.4;
    padding: 8px 20px;
    border-radius: 4px;
    margin-bottom: 4px;
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
    animation: subtitleFadeIn 0.3s ease-out;
  }

  .subtitle-line.fading {
    animation: subtitleFadeOut 0.5s ease-in forwards;
  }

  @keyframes subtitleFadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes subtitleFadeOut {
    from { opacity: 1; }
    to   { opacity: 0; }
  }
</style>
</head>
<body>
<div id="subtitle-display"></div>

<script>
  // Subtitle-only template — just displays captions, no other content.
  // The addSubtitle function is also injected into ALL templates via buildOverlayPage().
</script>
</body>
</html>
