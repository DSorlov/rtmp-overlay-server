<!--
  Breaking News Overlay Template
  Placeholders: {{headline}}, {{detail}}, {{channel}}, {{location}}
  Full-featured demo with animations, inline SVG icons, gradient bars, and a scrolling ticker.
-->
<style>
  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  @keyframes slideRight {
    from { transform: translateX(-100%); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes ticker {
    0%   { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
  }
  @keyframes glow {
    0%, 100% { box-shadow: 0 0 8px rgba(239, 83, 80, 0.6); }
    50%      { box-shadow: 0 0 20px rgba(239, 83, 80, 1); }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.15); }
  }
  @keyframes shimmer {
    0%   { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }

  .bn-wrap {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  }

  /* ── Top accent bar ─────────── */
  .bn-accent {
    height: 4px;
    background: linear-gradient(90deg, #ef5350, #ff9800, #ef5350);
    background-size: 400px 4px;
    animation: shimmer 2s linear infinite;
  }

  /* ── Main bar ───────────────── */
  .bn-main {
    display: flex;
    align-items: stretch;
    background: rgba(18, 18, 24, 0.95);
    min-height: 90px;
  }

  /* ── BREAKING badge ─────────── */
  .bn-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 24px;
    background: linear-gradient(135deg, #d32f2f, #ef5350);
    color: #fff;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    white-space: nowrap;
    animation: glow 1.5s ease-in-out infinite;
  }
  .bn-badge svg {
    flex-shrink: 0;
    animation: pulse 1.2s ease-in-out infinite;
  }

  /* ── Content area ───────────── */
  .bn-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 12px 28px;
    gap: 4px;
    border-left: 3px solid #ef5350;
    animation: slideRight 0.7s 0.2s both;
  }

  .bn-headline {
    color: #ffffff;
    font-size: 34px;
    font-weight: 700;
    line-height: 1.2;
  }

  .bn-detail {
    color: #b0bec5;
    font-size: 20px;
    font-weight: 400;
    line-height: 1.3;
  }

  /* ── Channel / location badge ── */
  .bn-meta {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 0 20px;
    border-left: 1px solid rgba(255,255,255,0.1);
    animation: fadeIn 0.8s 0.4s both;
  }

  .bn-channel {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(79, 195, 247, 0.15);
    border: 1px solid rgba(79, 195, 247, 0.4);
    border-radius: 4px;
    padding: 4px 12px;
    color: #4fc3f7;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .bn-channel svg { flex-shrink: 0; }

  .bn-location {
    display: flex;
    align-items: center;
    gap: 4px;
    color: #78909c;
    font-size: 13px;
  }
  .bn-location svg { flex-shrink: 0; }

  /* ── Live indicator ──────────── */
  .bn-live {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 18px;
    border-left: 1px solid rgba(255,255,255,0.1);
    animation: fadeIn 1s 0.6s both;
  }
  .bn-live-dot {
    width: 12px; height: 12px;
    background: #ef5350;
    border-radius: 50%;
    animation: pulse 1s ease-in-out infinite;
  }
  .bn-live-text {
    color: #ef5350;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 2px;
  }

  /* ── Spinning globe (decorative SVG) ── */
  .bn-globe {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 16px;
    border-left: 1px solid rgba(255,255,255,0.1);
    animation: fadeIn 1.2s 0.8s both;
  }
  .bn-globe svg {
    animation: spin 6s linear infinite;
    opacity: 0.4;
  }

  /* ── Scrolling ticker bar ───── */
  .bn-ticker {
    background: rgba(239, 83, 80, 0.9);
    overflow: hidden;
    height: 32px;
    position: relative;
  }
  .bn-ticker-text {
    position: absolute;
    white-space: nowrap;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    line-height: 32px;
    letter-spacing: 0.5px;
    animation: ticker 18s linear infinite;
  }
  .bn-ticker-text span {
    padding: 0 40px;
  }
  .bn-ticker-sep {
    color: rgba(255,255,255,0.5);
    padding: 0 12px;
  }
</style>

<div class="bn-wrap">
  <!-- Shimmer accent line -->
  <div class="bn-accent"></div>

  <!-- Main bar -->
  <div class="bn-main">

    <!-- BREAKING badge with alert icon -->
    <div class="bn-badge">
      <!-- Alert triangle SVG -->
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      BREAKING
    </div>

    <!-- Headline + detail -->
    <div class="bn-content">
      <div class="bn-headline" data-placeholder="headline">{{headline}}</div>
      <div class="bn-detail" data-placeholder="detail">{{detail}}</div>
    </div>

    <!-- Channel & location -->
    <div class="bn-meta">
      <div class="bn-channel">
        <!-- Broadcast tower SVG -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/>
          <path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.4"/>
          <path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.4"/>
          <path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/>
          <circle cx="12" cy="12" r="2"/>
          <line x1="12" y1="14" x2="12" y2="22"/>
        </svg>
        <span data-placeholder="channel">{{channel}}</span>
      </div>
      <div class="bn-location">
        <!-- Map pin SVG -->
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <span data-placeholder="location">{{location}}</span>
      </div>
    </div>

    <!-- LIVE indicator -->
    <div class="bn-live">
      <div class="bn-live-dot"></div>
      <span class="bn-live-text">LIVE</span>
    </div>

    <!-- Spinning globe -->
    <div class="bn-globe">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#4fc3f7" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
      </svg>
    </div>
  </div>

  <!-- Scrolling ticker -->
  <div class="bn-ticker">
    <div class="bn-ticker-text">
      <span data-placeholder="headline">{{headline}}</span>
      <span class="bn-ticker-sep">●</span>
      <span data-placeholder="detail">{{detail}}</span>
      <span class="bn-ticker-sep">●</span>
      <span data-placeholder="headline">{{headline}}</span>
      <span class="bn-ticker-sep">●</span>
      <span data-placeholder="detail">{{detail}}</span>
      <span class="bn-ticker-sep">●</span>
      <span data-placeholder="headline">{{headline}}</span>
    </div>
  </div>
</div>
