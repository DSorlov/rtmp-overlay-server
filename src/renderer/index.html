<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RTMP Overlay Server</title>
<style>
  :root {
    --bg-primary: #1a1a2e;
    --bg-secondary: #16213e;
    --bg-card: #1e2a45;
    --bg-input: #0f1929;
    --text-primary: #e0e0e0;
    --text-secondary: #a0a0b0;
    --accent: #4fc3f7;
    --accent-hover: #29b6f6;
    --success: #66bb6a;
    --error: #ef5350;
    --warning: #ffa726;
    --border: #2a3a5a;
    --sidebar-w: 260px;
    --tabbar-w: 48px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ──────────────────────────── */
  header {
    background: var(--bg-secondary);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 { font-size: 14px; font-weight: 600; color: var(--accent); }
  header .info { font-size: 11px; color: var(--text-secondary); font-family: monospace; }
  header .info span { color: var(--accent); }

  /* ── Main layout ─────────────────────── */
  .app {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* ── Tab bar (left) ──────────────────── */
  .tab-bar {
    width: var(--tabbar-w);
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 6px 0;
    gap: 4px;
    flex-shrink: 0;
  }

  .tab-btn {
    width: 38px;
    height: 38px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    transition: background .15s, color .15s;
    position: relative;
  }
  .tab-btn:hover { background: rgba(79, 195, 247, .08); color: var(--text-primary); }
  .tab-btn.active {
    background: rgba(79, 195, 247, .15);
    color: var(--accent);
  }
  .tab-btn.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 6px;
    bottom: 6px;
    width: 3px;
    background: var(--accent);
    border-radius: 0 3px 3px 0;
  }
  .tab-btn .tab-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-secondary);
    flex-shrink: 0;
  }
  .tab-btn .tab-dot.running  { background: var(--success); box-shadow: 0 0 4px var(--success); }
  .tab-btn .tab-dot.starting { background: var(--warning); animation: pulse 1s infinite; }
  .tab-btn .tab-dot.error    { background: var(--error); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── Preview area (center) ───────────── */
  .preview-area {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    background: #0a0a0a;
    position: relative;
  }

  .preview-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .preview-header .left { display: flex; align-items: center; gap: 8px; }
  .preview-header h2 { font-size: 13px; font-weight: 600; }
  .preview-header .meta { font-size: 10px; color: var(--text-secondary); font-family: monospace; }
  .preview-header .stats { display: flex; gap: 5px; align-items: center; }

  .stat-badge {
    font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 3px;
    font-family: monospace; display: flex; align-items: center; gap: 3px; white-space: nowrap;
  }
  .stat-pub {
    background: rgba(102, 187, 106, .15); color: var(--success); border: 1px solid rgba(102, 187, 106, .3);
  }
  .stat-pub.off {
    background: rgba(160, 160, 176, .1); color: var(--text-secondary); border: 1px solid rgba(160, 160, 176, .2);
  }
  .stat-viewers {
    background: rgba(79, 195, 247, .15); color: var(--accent); border: 1px solid rgba(79, 195, 247, .3);
  }

  .preview-pane {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
    overflow: hidden;
  }
  .preview-pane img { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
  .preview-pane .hint { color: var(--text-secondary); font-size: 13px; }

  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-secondary); flex-shrink: 0;
  }
  .dot.running  { background: var(--success); box-shadow: 0 0 5px var(--success); }
  .dot.starting { background: var(--warning); animation: pulse 1s infinite; }
  .dot.error    { background: var(--error); }

  /* ── Sidebar (right) ─────────────────── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg-card);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .sidebar-section {
    display: flex;
    flex-direction: column;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-section:last-child { border-bottom: none; flex: 1; min-height: 0; }

  .section-head {
    padding: 8px 12px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-secondary);
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-head:hover { color: var(--text-primary); }
  .section-head .collapse-arrow {
    font-size: 10px;
    transition: transform 0.15s ease;
  }
  .sidebar-section.collapsed .collapse-arrow { transform: rotate(-90deg); }
  .sidebar-section.collapsed > .section-body { display: none; }

  .section-body {
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto;
  }

  /* ── Form elements ───────────────────── */
  .field { display: flex; flex-direction: column; gap: 3px; }
  .field label {
    font-size: 10px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: .4px;
  }

  select, input[type=text] {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 5px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-family: inherit;
  }
  select:focus, input:focus { outline: none; border-color: var(--accent); }

  .btn {
    padding: 6px 14px; border: none; border-radius: 4px;
    font-size: 11px; font-weight: 600; cursor: pointer; transition: filter .15s;
    width: 100%;
  }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-go  { background: var(--success); color: #fff; }
  .btn-end { background: var(--error); color: #fff; }
  .btn:hover:not(:disabled) { filter: brightness(1.15); }

  .status-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-secondary);
  }
  .status-row .status-label { font-weight: 600; text-transform: capitalize; }
  .status-row .status-label.running  { color: var(--success); }
  .status-row .status-label.starting { color: var(--warning); }
  .status-row .status-label.stopped  { color: var(--text-secondary); }
  .status-row .status-label.error    { color: var(--error); }

  .err-msg { font-size: 10px; color: var(--error); padding: 4px 0; }

  /* ── Placeholder grid ────────────────── */
  .ph-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .ph-field { display: flex; flex-direction: column; gap: 2px; }
  .ph-field label {
    font-size: 10px;
    color: var(--accent);
    font-family: monospace;
  }
  .ph-field input {
    font-family: monospace;
  }
  .ph-empty {
    font-size: 11px;
    color: var(--text-secondary);
    font-style: italic;
    padding: 4px 0;
  }

  /* ── Settings view ───────────────────── */
  .settings-view {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .settings-header {
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .settings-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 16px;
    align-content: start;
  }
  .settings-body .full-width {
    grid-column: 1 / -1;
  }
  .settings-section {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: rgba(255,255,255,.02);
    overflow: hidden;
  }
  .settings-section-header {
    padding: 8px 14px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-primary);
    background: rgba(255,255,255,.04);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
  }
  .settings-section-header:hover {
    background: rgba(255,255,255,.07);
  }
  .settings-section-header .collapse-arrow {
    font-size: 10px;
    transition: transform .15s;
  }
  .settings-section.collapsed .collapse-arrow {
    transform: rotate(-90deg);
  }
  .settings-section.collapsed .settings-section-body {
    display: none;
  }
  .settings-section-body {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .settings-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .settings-group h3 {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-secondary);
    margin-bottom: 2px;
  }
  .settings-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .settings-row label {
    font-size: 11px;
    color: var(--text-secondary);
    width: 100px;
    flex-shrink: 0;
  }
  .settings-row input, .settings-row select {
    flex: 1;
    max-width: 220px;
  }
  .settings-row input[type=number] {
    width: 80px;
    max-width: 80px;
    -moz-appearance: textfield;
  }
  .settings-row input[type=number]::-webkit-inner-spin-button,
  .settings-row input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .settings-row input[type=color] {
    width: 40px;
    max-width: 40px;
    height: 30px;
    padding: 2px;
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 4px;
    cursor: pointer;
    flex: none;
  }
  .stream-color-input {
    width: 30px !important;
    max-width: 30px !important;
    height: 26px !important;
  }
  .chroma-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .chroma-row label {
    font-size: 10px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: .4px;
    flex-shrink: 0;
  }
  .chroma-row input[type=color] {
    width: 30px;
    height: 24px;
    padding: 1px;
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 4px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .chroma-row .color-hex {
    font-size: 10px;
    font-family: monospace;
    color: var(--text-primary);
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 4px;
    padding: 3px 6px;
    width: 66px;
    text-transform: uppercase;
  }
  .chroma-row .chroma-reset {
    font-size: 9px;
    color: var(--text-secondary);
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2px 5px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .chroma-row .chroma-reset:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  /* ── Background mode toggle ──────────── */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .mode-toggle button {
    flex: 1;
    padding: 5px 10px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    background: transparent;
    color: var(--text-secondary);
    border: none;
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  .mode-toggle button.active {
    background: var(--accent);
    color: #000;
  }
  .mode-toggle button:not(.active):hover {
    background: rgba(255,255,255,.06);
    color: var(--text-primary);
  }
  .alpha-info, .luma-info {
    font-size: 10px;
    color: var(--text-secondary);
    line-height: 1.5;
    padding: 2px 0;
  }
  .audio-info {
    font-size: 10px;
    color: var(--text-secondary);
    line-height: 1.5;
    padding: 2px 0;
  }
  .fn-result {
    font-size: 10px;
    color: var(--text-secondary);
    font-family: monospace;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    min-width: 0;
  }
  .fn-result.ok { color: var(--accent); }
  .fn-result.err { color: #e57373; }
  #fn-arg textarea, textarea {
    width: 100%;
    box-sizing: border-box;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 4px;
    color: var(--text-primary);
    padding: 6px 8px;
  }

  .color-hex {
    font-size: 11px;
    font-family: monospace;
    color: var(--text-primary);
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 4px;
    padding: 4px 8px;
    width: 80px;
    text-transform: uppercase;
  }
  .settings-actions {
    display: flex;
    gap: 8px;
    padding-top: 6px;
  }
  .btn-settings {
    padding: 7px 20px; border: none; border-radius: 4px;
    font-size: 11px; font-weight: 600; cursor: pointer;
    background: var(--accent); color: #000;
    transition: filter .15s;
  }
  .btn-settings:hover { filter: brightness(1.15); }
  .btn-settings:disabled { opacity: .4; cursor: not-allowed; }
  .settings-msg {
    font-size: 11px;
    padding: 6px 0;
  }
  .settings-msg.ok { color: var(--success); }
  .settings-msg.err { color: var(--error); }

  .settings-note {
    font-size: 10px;
    color: var(--text-secondary);
    font-style: italic;
  }

  /* ── Settings tab icon ───────────────── */
  .tab-bar .tab-spacer { flex: 1; }
  .tab-btn .tab-icon { font-size: 16px; line-height: 1; }

  /* ── Whisper model cards ─────────────── */
  .whisper-model-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: rgba(255,255,255,.03);
  }
  .whisper-model-info {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .whisper-model-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .whisper-model-badge {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    padding: 2px 6px;
    border-radius: 3px;
  }
  .whisper-model-badge.active {
    background: var(--accent);
    color: #000;
  }
  .whisper-model-badge.downloaded {
    background: rgba(76,175,80,.2);
    color: #4caf50;
  }
  .whisper-model-badge.not-downloaded {
    background: rgba(255,255,255,.06);
    color: var(--text-secondary);
  }
  .whisper-model-actions {
    display: flex;
    gap: 4px;
  }
  .whisper-model-actions button {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background .15s, color .15s, border-color .15s;
  }
  .whisper-model-actions button:hover {
    color: var(--text-primary);
    border-color: var(--accent);
  }
  .whisper-model-actions button.btn-use {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }
  .whisper-model-actions button.btn-use:hover {
    filter: brightness(1.15);
  }
  .whisper-model-actions button.btn-delete {
    color: var(--error);
    border-color: var(--error);
  }
  .whisper-model-actions button.btn-delete:hover {
    background: rgba(239,83,80,.15);
  }
  .whisper-model-actions button:disabled {
    opacity: .4;
    cursor: not-allowed;
  }

  /* ── Model picker modal ──────────────── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  .modal-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    min-width: 340px;
    max-width: 420px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }
  .modal-box h3 {
    margin: 0 0 4px;
    font-size: 14px;
    color: var(--text-primary);
  }
  .modal-box p {
    margin: 0 0 14px;
    font-size: 11px;
    color: var(--text-secondary);
  }
  .modal-model-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 14px;
  }
  .modal-model-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: rgba(255,255,255,.03);
    color: var(--text-primary);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .modal-model-btn:hover {
    background: rgba(255,255,255,.08);
    border-color: var(--accent);
  }
  .modal-model-btn .model-size {
    font-weight: 400;
    color: var(--text-secondary);
    font-size: 10px;
  }
  .modal-cancel {
    width: 100%;
    padding: 6px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    color: var(--text-secondary);
    font-size: 11px;
    cursor: pointer;
    transition: color .15s, border-color .15s;
  }
  .modal-cancel:hover {
    color: var(--text-primary);
    border-color: var(--text-primary);
  }
</style>
</head>
<body>

<header>
  <h1>RTMP Overlay Server</h1>
  <div class="info">API <span id="api-url">:3000</span> &middot; RTMP <span id="rtmp-info">:1935</span></div>
</header>

<div class="app" id="app">
  <div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-secondary)">Loading&hellip;</div>
</div>

<script>
const api = window.electronAPI;

let streams = [];
let templates = [];
let templatePlaceholders = {};
let rtmpStats = {};
let initReceived = false;
let activeTab = null;
let currentApiPort = 3000;
let currentRtmpPort = 1935;
let currentResolution = { width: 1920, height: 1080 };
let currentFrameRate = 30;
let currentEncoding = {
  preset: 'ultrafast', profile: 'baseline', level: '4.0', tune: 'zerolatency',
  videoBitrate: 4000, maxBitrate: 4500, bufferSize: 8000, gopSize: 0,
  audioBitrate: 128, pixelFormat: 'yuv420p',
};
let hostIP = '';
let whisperModels = [];

// ── debounce helper ───────────────────────
function debounce(fn, ms) {
  let t;
  return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

// ── IPC ───────────────────────────────────
if (api) {
  api.on('init-data', (data) => {
    initReceived = true;
    streams = data.streams;
    templates = data.templates;
    templatePlaceholders = data.templatePlaceholders || {};
    currentApiPort = data.apiPort;
    currentRtmpPort = data.rtmpPort;
    currentResolution = data.resolution || { width: 1920, height: 1080 };
    currentFrameRate = data.frameRate || 30;
    currentEncoding = data.encoding || currentEncoding;
    hostIP = data.hostIP || '';
    whisperModels = data.whisperModels || [];
    document.getElementById('api-url').textContent = `:${data.apiPort}`;
    document.getElementById('rtmp-info').textContent = `:${data.rtmpPort}`;
    // Preserve settings tab if it was active; otherwise pick first stream
    if (activeTab !== 'settings') {
      activeTab = streams.length > 0 ? streams[0].id : null;
    }
    buildUI();
  });

  api.on('stream-update', (state) => {
    const idx = streams.findIndex(s => s.id === state.id);
    const prev = idx !== -1 ? streams[idx] : null;
    if (idx !== -1) streams[idx] = state;
    patchTab(state.id);
    if (state.id === activeTab && activeTab !== 'settings') {
      // If background mode, luma invert, audio mode, or stream name changed, rebuild the whole view
      if (prev && (prev.backgroundMode !== state.backgroundMode || prev.lumaInverted !== state.lumaInverted || prev.audioMode !== state.audioMode || prev.audioDevice !== state.audioDevice || prev.streamName !== state.streamName || prev.subtitlesEnabled !== state.subtitlesEnabled || prev.subtitleLanguage !== state.subtitleLanguage || (prev.timer && state.timer && prev.timer.direction !== state.timer.direction))) {
        buildPreviewArea(state);
        buildSidebar(state);
      } else if (prev && state.timer && prev.timer && (prev.timer.display !== state.timer.display || prev.timer.running !== state.timer.running)) {
        // Lightweight timer patch — avoid full sidebar rebuild every second
        const td = document.getElementById('timer-display-' + state.id);
        if (td) {
          td.textContent = state.timer.display;
          td.style.color = state.timer.running ? '#4ade80' : '#e0e0e0';
        }
        // Also patch Start/Stop button states
        const startBtn = document.getElementById('timer-start-' + state.id);
        const stopBtn = document.getElementById('timer-stop-' + state.id);
        if (startBtn) {
          startBtn.textContent = state.timer.running ? '▶ Running' : '▶ Start';
          startBtn.disabled = state.timer.running;
        }
        if (stopBtn) {
          stopBtn.disabled = !state.timer.running;
        }
        patchActiveView();
      } else {
        patchActiveView();
      }
    }
  });

  api.on('preview-frame', ({ streamId, dataUrl }) => {
    if (streamId !== activeTab) return;
    const img = document.getElementById('preview-img');
    const hint = document.getElementById('preview-hint');
    if (img) { img.src = dataUrl; img.style.display = 'block'; }
    if (hint) hint.style.display = 'none';
  });

  api.on('template-placeholders', ({ template, placeholders }) => {
    templatePlaceholders[template] = placeholders;
    for (const s of streams) {
      if (s.currentTemplate === template && s.id === activeTab) rebuildPlaceholders();
    }
  });

  api.on('templates-updated', (t) => { templates = t; buildUI(); });

  api.on('audio-devices', (devices) => {
    window._audioDevices = devices;
    // Refresh audio device dropdown if visible
    if (activeTab !== null && activeTab !== 'settings') {
      const s = streams.find(st => st.id === activeTab);
      if (s && s.audioMode === 'device') buildSidebar(s);
    }
  });

  api.on('rtmp-stats', (stats) => {
    rtmpStats = stats;
    if (activeTab !== null && activeTab !== 'settings') patchActiveView();
  });

  api.on('settings-saved', (result) => {
    const msg = document.getElementById('settings-msg');
    if (!msg) return;
    if (result.success) {
      msg.className = 'settings-msg ok';
      msg.textContent = 'Settings saved and applied.';
    } else {
      msg.className = 'settings-msg err';
      msg.textContent = `Error: ${result.error}`;
    }
    const btn = document.getElementById('settings-save-btn');
    if (btn) btn.disabled = false;
  });

  api.on('whisper-status', (models) => {
    whisperModels = models;
    const container = document.getElementById('whisper-models-container');
    if (container) renderWhisperModels(container);
  });

  api.on('whisper-model-needed', ({ streamId }) => {
    showModelPickerDialog(streamId);
  });

  api.on('function-result', ({ streamId, functionName, found, result, error }) => {
    const el = document.getElementById(`fn-result-${streamId}`);
    if (!el) return;
    if (!found) {
      el.textContent = error || `"${functionName}" not found`;
      el.className = 'fn-result err';
    } else if (error) {
      el.textContent = `Error: ${error}`;
      el.className = 'fn-result err';
    } else if (result === undefined || result === null) {
      el.textContent = `✓ ${functionName}()`;
      el.className = 'fn-result ok';
    } else {
      try {
        el.textContent = `→ ${typeof result === 'object' ? JSON.stringify(result) : String(result)}`;
      } catch { el.textContent = `→ ${String(result)}`; }
      el.className = 'fn-result ok';
    }
  });
} else {
  document.getElementById('app').innerHTML =
    '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:#ef5350">electronAPI unavailable</div>';
}

// ── Switch tab ────────────────────────────
function switchTab(id) {
  activeTab = id;
  // Update tab active states
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.id == id);
  });
  if (id === 'settings') {
    buildSettingsView();
  } else {
    buildActiveView();
  }
}

// ── Build full UI ─────────────────────────
function buildUI() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  // Tab bar
  const tabBar = document.createElement('div');
  tabBar.className = 'tab-bar';
  tabBar.id = 'tab-bar';
  for (const s of streams) {
    const btn = document.createElement('button');
    btn.className = `tab-btn${s.id === activeTab ? ' active' : ''}`;
    btn.dataset.id = s.id;
    btn.title = `Stream ${s.id}`;
    btn.innerHTML = `<span class="tab-dot ${s.status}" id="tab-dot-${s.id}"></span><span>${s.id}</span>`;
    btn.addEventListener('click', () => switchTab(s.id));
    tabBar.appendChild(btn);
  }

  // Spacer to push settings to bottom
  const spacer = document.createElement('div');
  spacer.className = 'tab-spacer';
  tabBar.appendChild(spacer);

  // Settings tab button
  const settingsBtn = document.createElement('button');
  settingsBtn.className = `tab-btn${activeTab === 'settings' ? ' active' : ''}`;
  settingsBtn.dataset.id = 'settings';
  settingsBtn.title = 'Settings';
  settingsBtn.innerHTML = '<span class="tab-icon">⚙</span>';
  settingsBtn.addEventListener('click', () => switchTab('settings'));
  tabBar.appendChild(settingsBtn);

  app.appendChild(tabBar);

  // Preview area
  const previewArea = document.createElement('div');
  previewArea.className = 'preview-area';
  previewArea.id = 'preview-area';
  app.appendChild(previewArea);

  // Sidebar
  const sidebar = document.createElement('div');
  sidebar.className = 'sidebar';
  sidebar.id = 'sidebar';
  app.appendChild(sidebar);

  if (activeTab === 'settings') {
    buildSettingsView();
  } else {
    buildActiveView();
  }
}

// ── Build the active stream view (preview + sidebar) ──
function buildActiveView() {
  const s = streams.find(x => x.id === activeTab);
  if (!s) return;

  // Restore sidebar visibility (may have been hidden by settings view)
  const sidebar = document.getElementById('sidebar');
  if (sidebar) sidebar.style.display = '';

  buildPreviewArea(s);
  buildSidebar(s);
}

// ── Preview area ──────────────────────────
function buildPreviewArea(s) {
  const area = document.getElementById('preview-area');
  area.innerHTML = '';

  // Preview header
  const hdr = document.createElement('div');
  hdr.className = 'preview-header';
  hdr.id = 'preview-header';

  const st = rtmpStats[s.streamName];
  const pub = st && st.publishing;
  const viewers = (st && st.viewers) || 0;

  hdr.innerHTML = `
    <div class="left">
      <span class="dot ${s.status}" id="dot-${s.id}"></span>
      <h2>Stream ${s.id}</h2>
      <span class="meta" id="meta-${s.id}">${esc(displayUrl(s))}</span>
    </div>
    <div class="stats" id="stats-${s.id}">
      <span class="stat-badge ${pub ? 'stat-pub' : 'stat-pub off'}">● ${pub ? 'LIVE' : 'OFF'}</span>
      <span class="stat-badge stat-viewers">&#8505; ${viewers} viewer${viewers !== 1 ? 's' : ''}</span>
    </div>`;
  area.appendChild(hdr);

  // Preview pane
  const pane = document.createElement('div');
  pane.className = 'preview-pane';
  pane.innerHTML = `<img id="preview-img" alt=""><span class="hint" id="preview-hint">${s.status === 'stopped' ? 'Stopped' : s.status === 'starting' ? 'Starting…' : 'Loading…'}</span>`;
  area.appendChild(pane);
}

// ── Sidebar ───────────────────────────────
// Track collapsed state across rebuilds
const collapsedSections = {};

function makeSection(id, title, startCollapsed) {
  const section = document.createElement('div');
  section.className = 'sidebar-section';
  section.id = id;
  if (collapsedSections[id] ?? startCollapsed) section.classList.add('collapsed');

  const head = document.createElement('div');
  head.className = 'section-head';
  const label = document.createElement('span');
  label.textContent = title;
  const arrow = document.createElement('span');
  arrow.className = 'collapse-arrow';
  arrow.textContent = '▼';
  head.appendChild(label);
  head.appendChild(arrow);
  head.addEventListener('click', () => {
    section.classList.toggle('collapsed');
    collapsedSections[id] = section.classList.contains('collapsed');
  });
  section.appendChild(head);

  const body = document.createElement('div');
  body.className = 'section-body';
  section.appendChild(body);
  return { section, body };
}

function buildSidebar(s) {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';

  const bgMode = s.backgroundMode || 'chroma';

  // ─ CONTROL section ─
  const ctrl = makeSection('sec-control', 'Control', false);
  ctrl.body.id = 'ctrl-body';

  // Error
  if (s.error) {
    const e = document.createElement('div');
    e.className = 'err-msg';
    e.id = 'err-msg';
    e.textContent = s.error;
    ctrl.body.appendChild(e);
  }

  // Status row
  const statusRow = document.createElement('div');
  statusRow.className = 'status-row';
  statusRow.id = 'status-row';
  statusRow.innerHTML = `<span class="dot ${s.status}"></span><span class="status-label ${s.status}">${s.status}</span>`;
  ctrl.body.appendChild(statusRow);

  // Action button
  const actionWrap = document.createElement('div');
  actionWrap.id = 'action-wrap';
  const btn = document.createElement('button');
  if (s.status === 'running') {
    btn.className = 'btn btn-end';
    btn.textContent = 'Stop';
    btn.onclick = () => api.send('stream-action', { action: 'stop', streamId: s.id });
  } else {
    btn.className = 'btn btn-go';
    btn.textContent = s.status === 'starting' ? 'Starting…' : 'Start';
    btn.disabled = s.status === 'starting';
    btn.onclick = () => api.send('stream-action', { action: 'start', streamId: s.id });
  }
  actionWrap.appendChild(btn);
  ctrl.body.appendChild(actionWrap);

  // Stream key
  const keyField = document.createElement('div');
  keyField.className = 'field';
  const keyLabel = document.createElement('label');
  keyLabel.textContent = 'Stream Key';
  const keyInp = document.createElement('input');
  keyInp.type = 'text';
  keyInp.id = `stream-key-${s.id}`;
  keyInp.value = s.streamName || '';
  keyInp.placeholder = `overlay${s.id}`;
  keyInp.addEventListener('change', () => {
    const val = keyInp.value.trim();
    if (!val) { keyInp.value = s.streamName; return; }
    if (streams.some(st => st.id !== s.id && st.streamName === val)) {
      alert('Stream key must be unique.');
      keyInp.value = s.streamName;
      return;
    }
    api.send('stream-action', { action: 'set-stream-key', streamId: s.id, key: val });
  });
  keyField.appendChild(keyLabel);
  keyField.appendChild(keyInp);
  ctrl.body.appendChild(keyField);

  sidebar.appendChild(ctrl.section);

  // ─ TEMPLATE section ─
  const tpl = makeSection('sec-template', 'Template', true);

  const tplField = document.createElement('div');
  tplField.className = 'field';
  const tplLabel = document.createElement('label');
  tplLabel.textContent = 'Template';
  const sel = document.createElement('select');
  sel.id = `tpl-${s.id}`;
  for (const t of templates) {
    const opt = document.createElement('option');
    opt.value = t;
    opt.textContent = t.replace(/\.html$/, '');
    if (t === s.currentTemplate) opt.selected = true;
    sel.appendChild(opt);
  }
  sel.addEventListener('change', () => onTemplateChange(s.id));
  tplField.appendChild(tplLabel);
  tplField.appendChild(sel);
  tpl.body.appendChild(tplField);

  sidebar.appendChild(tpl.section);

  // ─ BACKGROUND section (unified: mode selector + mode-specific settings) ─
  const bg = makeSection('sec-background', 'Background', true);

  // Mode selector
  const modeField = document.createElement('div');
  modeField.className = 'field';
  const modeLabel = document.createElement('label');
  modeLabel.textContent = 'Mode';
  const modeToggle = document.createElement('div');
  modeToggle.className = 'mode-toggle';
  modeToggle.id = 'mode-toggle';
  const chromaBtn = document.createElement('button');
  chromaBtn.textContent = 'Chroma';
  chromaBtn.className = bgMode === 'chroma' ? 'active' : '';
  const alphaBtn = document.createElement('button');
  alphaBtn.textContent = 'Alpha';
  alphaBtn.className = bgMode === 'alpha' ? 'active' : '';
  const lumaBtn = document.createElement('button');
  lumaBtn.textContent = 'Luma';
  lumaBtn.className = bgMode === 'luma' ? 'active' : '';
  chromaBtn.addEventListener('click', () => {
    if (bgMode === 'chroma') return;
    api.send('stream-action', { action: 'set-background-mode', streamId: s.id, mode: 'chroma' });
  });
  alphaBtn.addEventListener('click', () => {
    if (bgMode === 'alpha') return;
    api.send('stream-action', { action: 'set-background-mode', streamId: s.id, mode: 'alpha' });
  });
  lumaBtn.addEventListener('click', () => {
    if (bgMode === 'luma') return;
    api.send('stream-action', { action: 'set-background-mode', streamId: s.id, mode: 'luma' });
  });
  modeToggle.appendChild(chromaBtn);
  modeToggle.appendChild(alphaBtn);
  modeToggle.appendChild(lumaBtn);
  modeField.appendChild(modeLabel);
  modeField.appendChild(modeToggle);
  bg.body.appendChild(modeField);

  // Mode-specific settings
  if (bgMode === 'chroma') {
    const chromaRow = document.createElement('div');
    chromaRow.className = 'chroma-row';
    chromaRow.id = 'chroma-row';
    const chromaLabel = document.createElement('label');
    chromaLabel.textContent = 'Color';
    const chromaPicker = document.createElement('input');
    chromaPicker.type = 'color';
    chromaPicker.id = `chroma-${s.id}`;
    chromaPicker.value = s.chromaKeyColor || '#00FF00';
    const chromaHex = document.createElement('input');
    chromaHex.type = 'text';
    chromaHex.className = 'color-hex';
    chromaHex.id = `chroma-hex-${s.id}`;
    chromaHex.value = (s.chromaKeyColor || '#00FF00').toUpperCase();
    chromaHex.maxLength = 7;
    const chromaReset = document.createElement('button');
    chromaReset.className = 'chroma-reset';
    chromaReset.textContent = 'Default';
    chromaReset.title = 'Reset to default (#00FF00)';
    chromaPicker.addEventListener('change', () => {
      chromaHex.value = chromaPicker.value.toUpperCase();
      api.send('stream-action', { action: 'set-chroma', streamId: s.id, color: chromaPicker.value });
    });
    chromaHex.addEventListener('change', () => {
      let v = chromaHex.value.trim();
      if (!v.startsWith('#')) v = '#' + v;
      if (/^#[0-9A-Fa-f]{6}$/.test(v)) {
        chromaPicker.value = v;
        chromaHex.value = v.toUpperCase();
        api.send('stream-action', { action: 'set-chroma', streamId: s.id, color: v });
      } else {
        chromaHex.value = chromaPicker.value.toUpperCase();
      }
    });
    chromaReset.addEventListener('click', () => {
      chromaPicker.value = '#00FF00';
      chromaHex.value = '#00FF00';
      api.send('stream-action', { action: 'set-chroma', streamId: s.id, color: '' });
    });
    chromaRow.appendChild(chromaLabel);
    chromaRow.appendChild(chromaPicker);
    chromaRow.appendChild(chromaHex);
    chromaRow.appendChild(chromaReset);
    bg.body.appendChild(chromaRow);
  } else if (bgMode === 'alpha') {
    const info = document.createElement('div');
    info.className = 'alpha-info';
    info.innerHTML = 'Output uses <strong>stacked alpha</strong> format — the top half is RGB and the bottom half is the alpha mask.<br><br>In OBS, use an <em>Image Mask/Blend</em> filter or a plugin that supports alpha-packed video to decode transparency.';
    bg.body.appendChild(info);
  } else if (bgMode === 'luma') {
    // Invert toggle
    const invertField = document.createElement('div');
    invertField.className = 'field';
    const invertLabel = document.createElement('label');
    invertLabel.textContent = 'Background';
    const invertToggle = document.createElement('div');
    invertToggle.className = 'mode-toggle';
    const blackBtn = document.createElement('button');
    blackBtn.textContent = 'Black';
    blackBtn.className = !s.lumaInverted ? 'active' : '';
    const whiteBtn = document.createElement('button');
    whiteBtn.textContent = 'White';
    whiteBtn.className = s.lumaInverted ? 'active' : '';
    blackBtn.addEventListener('click', () => {
      if (!s.lumaInverted) return;
      api.send('stream-action', { action: 'set-luma-inverted', streamId: s.id, inverted: false });
    });
    whiteBtn.addEventListener('click', () => {
      if (s.lumaInverted) return;
      api.send('stream-action', { action: 'set-luma-inverted', streamId: s.id, inverted: true });
    });
    invertToggle.appendChild(blackBtn);
    invertToggle.appendChild(whiteBtn);
    invertField.appendChild(invertLabel);
    invertField.appendChild(invertToggle);
    bg.body.appendChild(invertField);

    const info = document.createElement('div');
    info.className = 'luma-info';
    info.innerHTML = s.lumaInverted
      ? 'Output uses a <strong>white background</strong> for inverted luma keying. Dark overlay elements are visible; bright areas become transparent.<br><br>In OBS, add a <em>Luma Key</em> filter to the source to remove the white background.'
      : 'Output uses a <strong>black background</strong> for luma keying. Bright overlay elements are visible; dark areas become transparent.<br><br>In OBS, add a <em>Luma Key</em> filter to the source to remove the black background.';
    bg.body.appendChild(info);
  }

  sidebar.appendChild(bg.section);

  // ─ AUDIO section ─
  const audioMode = s.audioMode || 'none';
  const aud = makeSection('sec-audio', 'Audio', true);

  // Audio mode selector
  const audioModeField = document.createElement('div');
  audioModeField.className = 'field';
  const audioModeLabel = document.createElement('label');
  audioModeLabel.textContent = 'Source';
  const audioModeToggle = document.createElement('div');
  audioModeToggle.className = 'mode-toggle';
  const noneBtn = document.createElement('button');
  noneBtn.textContent = 'None';
  noneBtn.className = audioMode === 'none' ? 'active' : '';
  const templateBtn = document.createElement('button');
  templateBtn.textContent = 'Template';
  templateBtn.className = audioMode === 'template' ? 'active' : '';
  const deviceBtn = document.createElement('button');
  deviceBtn.textContent = 'Device';
  deviceBtn.className = audioMode === 'device' ? 'active' : '';
  noneBtn.addEventListener('click', () => {
    if (audioMode === 'none') return;
    api.send('stream-action', { action: 'set-audio-mode', streamId: s.id, mode: 'none' });
  });
  templateBtn.addEventListener('click', () => {
    if (audioMode === 'template') return;
    api.send('stream-action', { action: 'set-audio-mode', streamId: s.id, mode: 'template' });
  });
  deviceBtn.addEventListener('click', () => {
    if (audioMode === 'device') return;
    api.send('stream-action', { action: 'set-audio-mode', streamId: s.id, mode: 'device' });
  });
  audioModeToggle.appendChild(noneBtn);
  audioModeToggle.appendChild(templateBtn);
  audioModeToggle.appendChild(deviceBtn);
  audioModeField.appendChild(audioModeLabel);
  audioModeField.appendChild(audioModeToggle);
  aud.body.appendChild(audioModeField);

  // Mode-specific settings
  if (audioMode === 'none') {
    const info = document.createElement('div');
    info.className = 'audio-info';
    info.textContent = 'A silent audio track is included in the RTMP output.';
    aud.body.appendChild(info);
  } else if (audioMode === 'template') {
    const info = document.createElement('div');
    info.className = 'audio-info';
    info.innerHTML = 'Audio from the HTML template page (Web Audio API) is captured and included in the RTMP output.<br><br>The template must use the <code>AudioContext</code> API to produce sound.';
    aud.body.appendChild(info);
  } else if (audioMode === 'device') {
    // Device selector dropdown
    const devField = document.createElement('div');
    devField.className = 'field';
    const devLabel = document.createElement('label');
    devLabel.textContent = 'Device';
    const devSelect = document.createElement('select');
    devSelect.id = `audio-dev-${s.id}`;
    const optNone = document.createElement('option');
    optNone.value = '';
    optNone.textContent = '— Select device —';
    devSelect.appendChild(optNone);

    // Populate from cached audio devices
    if (window._audioDevices) {
      for (const d of window._audioDevices) {
        const opt = document.createElement('option');
        opt.value = d.index;
        opt.textContent = d.name || `Device ${d.index}`;
        if (d.index === (s.audioDevice || '')) opt.selected = true;
        devSelect.appendChild(opt);
      }
    }

    devSelect.addEventListener('change', () => {
      api.send('stream-action', { action: 'set-audio-device', streamId: s.id, device: devSelect.value });
    });

    const refreshBtn = document.createElement('button');
    refreshBtn.className = 'chroma-reset';
    refreshBtn.textContent = 'Refresh';
    refreshBtn.title = 'Refresh audio device list';
    refreshBtn.addEventListener('click', () => {
      api.send('get-audio-devices');
    });

    devField.appendChild(devLabel);
    devField.appendChild(devSelect);
    devField.appendChild(refreshBtn);
    aud.body.appendChild(devField);

    const info = document.createElement('div');
    info.className = 'audio-info';
    info.innerHTML = 'Audio from the selected system input device is captured by FFmpeg and included in the RTMP output.';
    aud.body.appendChild(info);

    // Request device list if not cached
    if (!window._audioDevices) {
      api.send('get-audio-devices');
    }
  }

  sidebar.appendChild(aud.section);

  // ─ TIMER section ─
  const timerState = s.timer || { running: false, direction: 'down', duration: 300, remaining: 300, display: '05:00' };
  const tmr = makeSection('sec-timer', 'Timer', true);

  // Timer display
  const timerDisplay = document.createElement('div');
  timerDisplay.style.cssText = 'text-align:center;font-size:32px;font-weight:700;font-family:monospace;color:#e0e0e0;padding:8px 0;letter-spacing:2px;';
  timerDisplay.id = `timer-display-${s.id}`;
  timerDisplay.textContent = timerState.display || '05:00';
  if (timerState.running) timerDisplay.style.color = '#4ade80';
  tmr.body.appendChild(timerDisplay);

  // Time inputs (minutes and seconds)
  const timeField = document.createElement('div');
  timeField.className = 'field';
  const timeLabel = document.createElement('label');
  timeLabel.textContent = 'Set Time';
  const timeInputWrap = document.createElement('div');
  timeInputWrap.style.cssText = 'display:flex;gap:4px;align-items:center;';

  const totalSec = timerState.duration || 300;
  const minInp = document.createElement('input');
  minInp.type = 'number';
  minInp.min = '0';
  minInp.max = '999';
  minInp.value = String(Math.floor(totalSec / 60));
  minInp.style.cssText = 'width:60px;text-align:center;';
  minInp.title = 'Minutes';
  const sep = document.createElement('span');
  sep.textContent = ':';
  sep.style.cssText = 'color:#999;font-weight:bold;';
  const secInp = document.createElement('input');
  secInp.type = 'number';
  secInp.min = '0';
  secInp.max = '59';
  secInp.value = String(totalSec % 60).padStart(2, '0');
  secInp.style.cssText = 'width:60px;text-align:center;';
  secInp.title = 'Seconds';

  const applyTime = () => {
    const m = Math.max(0, parseInt(minInp.value) || 0);
    const sc = Math.max(0, Math.min(59, parseInt(secInp.value) || 0));
    const total = m * 60 + sc;
    api.send('stream-action', { action: 'timer-set-duration', streamId: s.id, seconds: total });
  };
  minInp.addEventListener('change', applyTime);
  secInp.addEventListener('change', applyTime);

  timeInputWrap.appendChild(minInp);
  timeInputWrap.appendChild(sep);
  timeInputWrap.appendChild(secInp);
  timeField.appendChild(timeLabel);
  timeField.appendChild(timeInputWrap);
  tmr.body.appendChild(timeField);

  // Direction toggle
  const dirField = document.createElement('div');
  dirField.className = 'field';
  const dirLabel = document.createElement('label');

// ── Fill placeholder inputs ───────────────
function fillPlaceholderFields(container, s) {
  const keys = templatePlaceholders[s.currentTemplate] || [];
  if (keys.length === 0) {
    container.innerHTML = '<div class="ph-empty">No placeholders for this template</div>';
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'ph-grid';

  for (const key of keys) {
    const field = document.createElement('div');
    field.className = 'ph-field';

    const lbl = document.createElement('label');
    lbl.textContent = key;

    const inp = document.createElement('input');
    inp.type = 'text';
    inp.value = (s.placeholderData && s.placeholderData[key]) || '';
    inp.placeholder = key;
    inp.dataset.stream = String(s.id);
    inp.dataset.key = key;
    inp.addEventListener('input', debounce(() => sendPlaceholder(s.id), 300));
    inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendPlaceholder(s.id); });

    field.appendChild(lbl);
    field.appendChild(inp);
    grid.appendChild(field);
  }

  container.innerHTML = '';
  container.appendChild(grid);
}

// ── Rebuild only the placeholder section ──
function rebuildPlaceholders() {
  const s = streams.find(x => x.id === activeTab);
  const ph = document.getElementById('ph-wrap');
  if (!s || !ph) return;
  fillPlaceholderFields(ph, s);
}

// ── Send current placeholder values to main ──
function sendPlaceholder(id) {
  const ph = document.getElementById('ph-wrap');
  if (!ph) return;
  const data = {};
  ph.querySelectorAll('input[data-key]').forEach(inp => {
    data[inp.dataset.key] = inp.value;
  });
  api.send('stream-action', { action: 'set-data', streamId: id, data });
}

// ── Template change ───────────────────────
function onTemplateChange(id) {
  const sel = document.getElementById(`tpl-${id}`);
  if (!sel) return;
  const tpl = sel.value;

  api.send('stream-action', { action: 'change-template', streamId: id, template: tpl });

  const s = streams.find(x => x.id === id);
  if (s) {
    s.currentTemplate = tpl;
    const newKeys = templatePlaceholders[tpl] || [];
    const cleaned = {};
    for (const k of newKeys) {
      if (s.placeholderData && s.placeholderData[k] !== undefined) cleaned[k] = s.placeholderData[k];
      else cleaned[k] = '';
    }
    s.placeholderData = cleaned;
  }

  if (templatePlaceholders[tpl]) {
    rebuildPlaceholders();
  } else {
    api.send('get-template-placeholders', tpl);
  }
}

// ── Patch a tab button (any stream, always) ──
function patchTab(id) {
  const s = streams.find(x => x.id === id);
  if (!s) return;
  const dot = document.getElementById(`tab-dot-${id}`);
  if (dot) dot.className = `tab-dot ${s.status}`;
}

// ── Patch the active view (preview + sidebar) without full rebuild ──
function patchActiveView() {
  const s = streams.find(x => x.id === activeTab);
  if (!s) return;

  // Preview header dot
  const dot = document.getElementById(`dot-${s.id}`);
  if (dot) dot.className = `dot ${s.status}`;

  // Preview hint
  const hint = document.getElementById('preview-hint');
  if (hint) {
    if (s.status === 'stopped') { hint.textContent = 'Stopped'; hint.style.display = ''; }
    else if (s.status === 'running') { hint.textContent = 'Loading…'; }
    else if (s.status === 'starting') { hint.textContent = 'Starting…'; }
  }

  // Hide preview image when stopped
  if (s.status === 'stopped') {
    const img = document.getElementById('preview-img');
    if (img) { img.style.display = 'none'; img.removeAttribute('src'); }
    if (hint) hint.style.display = '';
  }

  // Stats
  const st = rtmpStats[s.streamName];
  const pub = st && st.publishing;
  const viewers = (st && st.viewers) || 0;
  const statsEl = document.getElementById(`stats-${s.id}`);
  if (statsEl) {
    statsEl.innerHTML = `
      <span class="stat-badge ${pub ? 'stat-pub' : 'stat-pub off'}">● ${pub ? 'LIVE' : 'OFF'}</span>
      <span class="stat-badge stat-viewers">&#8505; ${viewers} viewer${viewers !== 1 ? 's' : ''}</span>`;
  }

  // Status row in sidebar
  const statusRow = document.getElementById('status-row');
  if (statusRow) {
    statusRow.innerHTML = `<span class="dot ${s.status}"></span><span class="status-label ${s.status}">${s.status}</span>`;
  }

  // Action button
  const actionWrap = document.getElementById('action-wrap');
  if (actionWrap) {
    actionWrap.innerHTML = '';
    const btn = document.createElement('button');
    if (s.status === 'running') {
      btn.className = 'btn btn-end';
      btn.textContent = 'Stop';
      btn.onclick = () => api.send('stream-action', { action: 'stop', streamId: s.id });
    } else {
      btn.className = 'btn btn-go';
      btn.textContent = s.status === 'starting' ? 'Starting…' : 'Start';
      btn.disabled = s.status === 'starting';
      btn.onclick = () => api.send('stream-action', { action: 'start', streamId: s.id });
    }
    actionWrap.appendChild(btn);
  }

  // Template select
  const sel = document.getElementById(`tpl-${s.id}`);
  if (sel && sel.value !== s.currentTemplate) {
    sel.value = s.currentTemplate;
    rebuildPlaceholders();
  }

  // Sync placeholder input values without disrupting typing
  const phWrap = document.getElementById('ph-wrap');
  if (phWrap && s.placeholderData) {
    const inputs = phWrap.querySelectorAll('input[data-key]');
    const focused = document.activeElement;
    inputs.forEach(inp => {
      const newVal = s.placeholderData[inp.dataset.key] ?? '';
      if (inp !== focused && inp.value !== newVal) {
        inp.value = newVal;
      }
    });
  }

  // Error message
  const ctrlBody = document.getElementById('ctrl-body');
  if (ctrlBody) {
    const existing = ctrlBody.querySelector('.err-msg');
    if (s.error) {
      if (existing) { existing.textContent = s.error; }
      else { const e = document.createElement('div'); e.className = 'err-msg'; e.id = 'err-msg'; e.textContent = s.error; ctrlBody.insertBefore(e, ctrlBody.firstChild); }
    } else if (existing) {
      existing.remove();
    }
  }
}

// ── Model picker dialog ──────────────────
function showModelPickerDialog(streamId) {
  // Remove any existing modal
  const existing = document.getElementById('model-picker-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'model-picker-overlay';
  overlay.className = 'modal-overlay';

  const box = document.createElement('div');
  box.className = 'modal-box';

  const title = document.createElement('h3');
  title.textContent = 'Speech Model Required';
  box.appendChild(title);

  const desc = document.createElement('p');
  desc.textContent = 'No speech recognition model is downloaded. Choose a model to download for subtitle generation.';
  box.appendChild(desc);

  const list = document.createElement('div');
  list.className = 'modal-model-list';

  const models = whisperModels.length > 0
    ? whisperModels
    : [
        { id: 'tiny',     label: 'Tiny',      sizeMB: 75 },
        { id: 'base',     label: 'Base',      sizeMB: 142 },
        { id: 'small',    label: 'Small',     sizeMB: 466 },
        { id: 'medium',   label: 'Medium',    sizeMB: 1500 },
        { id: 'large-v3', label: 'Large v3',  sizeMB: 3100 },
      ];

  for (const m of models) {
    const btn = document.createElement('button');
    btn.className = 'modal-model-btn';

    const nameSpan = document.createElement('span');
    nameSpan.textContent = m.label || m.id;
    btn.appendChild(nameSpan);

    const sizeSpan = document.createElement('span');
    sizeSpan.className = 'model-size';
    const mb = m.sizeMB || 0;
    sizeSpan.textContent = mb >= 1000 ? `${(mb / 1000).toFixed(1)} GB` : `${mb} MB`;
    btn.appendChild(sizeSpan);

    btn.addEventListener('click', () => {
      overlay.remove();
      api.send('whisper-model-selected', { modelId: m.id, streamId });
    });

    list.appendChild(btn);
  }
  box.appendChild(list);

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'modal-cancel';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.addEventListener('click', () => overlay.remove());
  box.appendChild(cancelBtn);

  overlay.appendChild(box);

  // Close on overlay click (outside the box)
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.remove();
  });

  document.body.appendChild(overlay);
}

// ── Render whisper model rows ─────────────
function renderWhisperModels(container) {
  container.innerHTML = '';
  if (!whisperModels || whisperModels.length === 0) {
    container.innerHTML = '<div class="settings-note">No models available</div>';
    return;
  }
  for (const m of whisperModels) {
    const row = document.createElement('div');
    row.className = 'whisper-model-row';

    // Left side: name + badge
    const info = document.createElement('div');
    info.className = 'whisper-model-info';

    const name = document.createElement('span');
    name.className = 'whisper-model-name';
    name.textContent = m.label;
    info.appendChild(name);

    const badge = document.createElement('span');
    badge.className = 'whisper-model-badge';
    if (m.downloading) {
      badge.classList.add('active');
      badge.textContent = 'Downloading…';
    } else if (m.active) {
      badge.classList.add('active');
      badge.textContent = 'Active';
    } else if (m.downloaded) {
      badge.classList.add('downloaded');
      badge.textContent = 'Downloaded';
    } else {
      badge.classList.add('not-downloaded');
      badge.textContent = 'Not Downloaded';
    }
    info.appendChild(badge);
    row.appendChild(info);

    // Right side: action buttons
    const actions = document.createElement('div');
    actions.className = 'whisper-model-actions';

    if (m.downloading) {
      // Cancel button for in-progress download
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'btn-delete';
      cancelBtn.textContent = 'Cancel';
      cancelBtn.addEventListener('click', () => {
        api.send('cancel-whisper-download');
        cancelBtn.disabled = true;
        cancelBtn.textContent = 'Cancelling…';
      });
      actions.appendChild(cancelBtn);
    } else if (!m.downloaded) {
      // Download button
      const dlBtn = document.createElement('button');
      dlBtn.textContent = 'Download';
      dlBtn.addEventListener('click', () => {
        dlBtn.disabled = true;
        dlBtn.textContent = 'Downloading…';
        api.send('download-whisper-model', m.id);
      });
      actions.appendChild(dlBtn);
    } else {
      // Downloaded (active or not) — show Use + Delete
      if (!m.active) {
        const useBtn = document.createElement('button');
        useBtn.className = 'btn-use';
        useBtn.textContent = 'Use';
        useBtn.addEventListener('click', () => {
          api.send('set-whisper-model', m.id);
        });
        actions.appendChild(useBtn);
      }

      // Delete button (available for all downloaded models, including active)
      const delBtn = document.createElement('button');
      delBtn.className = 'btn-delete';
      delBtn.textContent = 'Delete';
      delBtn.addEventListener('click', () => {
        const extra = m.active ? ' This will disable subtitles on all streams.' : '';
        if (confirm(`Delete ${m.label}?${extra} You can re-download it later.`)) {
          api.send('delete-whisper-model', m.id);
        }
      });
      actions.appendChild(delBtn);
    }

    row.appendChild(actions);
    container.appendChild(row);
  }
}

// ── Build settings view ───────────────────
function buildSettingsView() {
  const area = document.getElementById('preview-area');
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';
  sidebar.style.display = 'none';
  area.innerHTML = '';
  area.style.flex = '1';

  const wrap = document.createElement('div');
  wrap.className = 'settings-view';

  const hdr = document.createElement('div');
  hdr.className = 'settings-header';
  hdr.textContent = 'Settings';
  wrap.appendChild(hdr);

  const body = document.createElement('div');
  body.className = 'settings-body';

  // ════════════════════════════════════════
  // SECTION 1 — General Settings
  // ════════════════════════════════════════
  function makeSettingsSection(title) {
    const sec = document.createElement('div');
    sec.className = 'settings-section';
    const hdr = document.createElement('div');
    hdr.className = 'settings-section-header';
    const label = document.createElement('span');
    label.textContent = title;
    const arrow = document.createElement('span');
    arrow.className = 'collapse-arrow';
    arrow.textContent = '▼';
    hdr.appendChild(label);
    hdr.appendChild(arrow);
    hdr.addEventListener('click', () => sec.classList.toggle('collapsed'));
    sec.appendChild(hdr);
    const bd = document.createElement('div');
    bd.className = 'settings-section-body';
    sec.appendChild(bd);
    return { section: sec, body: bd };
  }

  const general = makeSettingsSection('General');
  const generalSection = general.section;
  const generalBody = general.body;
  // ─ Server group ─
  const serverGroup = document.createElement('div');
  serverGroup.className = 'settings-group';
  serverGroup.innerHTML = '<h3>Server</h3>';

  // API port
  const apiRow = document.createElement('div');
  apiRow.className = 'settings-row';
  apiRow.innerHTML = `<label>API Port</label>`;
  const apiInp = document.createElement('input');
  apiInp.type = 'number'; apiInp.id = 'set-api-port';
  apiInp.min = '1024'; apiInp.max = '65535';
  apiInp.value = String(currentApiPort);
  apiRow.appendChild(apiInp);
  serverGroup.appendChild(apiRow);

  // RTMP port
  const rtmpRow = document.createElement('div');
  rtmpRow.className = 'settings-row';
  rtmpRow.innerHTML = `<label>RTMP Port</label>`;
  const rtmpInp = document.createElement('input');
  rtmpInp.type = 'number'; rtmpInp.id = 'set-rtmp-port';
  rtmpInp.min = '1024'; rtmpInp.max = '65535';
  rtmpInp.value = String(currentRtmpPort);
  rtmpRow.appendChild(rtmpInp);
  serverGroup.appendChild(rtmpRow);

  const portNote = document.createElement('div');
  portNote.className = 'settings-note';
  portNote.textContent = 'Changing RTMP port will stop all running streams.';
  serverGroup.appendChild(portNote);

  generalBody.appendChild(serverGroup);

  // ─ Streams group ─
  const streamsGroup = document.createElement('div');
  streamsGroup.className = 'settings-group';
  streamsGroup.innerHTML = '<h3>Streams</h3>';

  // Stream count
  const countRow = document.createElement('div');
  countRow.className = 'settings-row';
  countRow.innerHTML = `<label>Stream Count</label>`;
  const countInp = document.createElement('input');
  countInp.type = 'number'; countInp.id = 'set-stream-count';
  countInp.min = '1'; countInp.max = '12';
  countInp.value = String(streams.length);
  countRow.appendChild(countInp);
  streamsGroup.appendChild(countRow);

  const reduceNote = document.createElement('div');
  reduceNote.className = 'settings-note';
  reduceNote.textContent = 'Reducing count will stop and remove streams above the new limit.';
  streamsGroup.appendChild(reduceNote);

  generalBody.appendChild(streamsGroup);

  // ─ Save button + message (inside General section) ─
  const actions = document.createElement('div');
  actions.className = 'settings-actions';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn-settings';
  saveBtn.id = 'settings-save-btn';
  saveBtn.textContent = 'Apply & Save';
  saveBtn.addEventListener('click', applySettings);
  actions.appendChild(saveBtn);
  generalBody.appendChild(actions);

  const msg = document.createElement('div');
  msg.id = 'settings-msg';
  msg.className = 'settings-msg';
  generalBody.appendChild(msg);

  generalSection.appendChild(generalBody);
  body.appendChild(generalSection);

  // ════════════════════════════════════════
  // SECTION 2 — Stream Output
  // ════════════════════════════════════════
  const output = makeSettingsSection('Stream Output');

  // ─ Resolution group ─
  const resGroup = document.createElement('div');
  resGroup.className = 'settings-group';
  resGroup.innerHTML = '<h3>Resolution</h3>';

  const resRow = document.createElement('div');
  resRow.className = 'settings-row';
  resRow.innerHTML = '<label>Preset</label>';
  const resSel = document.createElement('select');
  resSel.id = 'set-resolution';
  const resOptions = [
    { label: '1920 × 1080 (Full HD)', w: 1920, h: 1080 },
    { label: '1280 × 720 (HD)', w: 1280, h: 720 },
    { label: '3840 × 2160 (4K)', w: 3840, h: 2160 },
    { label: '2560 × 1440 (QHD)', w: 2560, h: 1440 },
    { label: '1024 × 576', w: 1024, h: 576 },
  ];
  let customRes = true;
  resOptions.forEach(o => {
    const opt = document.createElement('option');
    opt.value = `${o.w}x${o.h}`;
    opt.textContent = o.label;
    if (currentResolution.width === o.w && currentResolution.height === o.h) {
      opt.selected = true;
      customRes = false;
    }
    resSel.appendChild(opt);
  });
  // Custom option for non-preset resolutions
  const customOpt = document.createElement('option');
  customOpt.value = 'custom';
  customOpt.textContent = 'Custom';
  if (customRes) customOpt.selected = true;
  resSel.appendChild(customOpt);

  resRow.appendChild(resSel);
  resGroup.appendChild(resRow);

  // Custom width/height inputs
  const customRow = document.createElement('div');
  customRow.className = 'settings-row';
  customRow.id = 'custom-res-row';
  customRow.style.display = customRes || resSel.value === 'custom' ? 'flex' : 'none';
  customRow.innerHTML = '<label>Size</label>';
  const customWrap = document.createElement('div');
  customWrap.style.cssText = 'display:flex;gap:4px;align-items:center;';
  const widthInp = document.createElement('input');
  widthInp.type = 'number'; widthInp.id = 'set-res-width';
  widthInp.min = '320'; widthInp.max = '7680';
  widthInp.value = String(currentResolution.width);
  widthInp.style.cssText = 'width:70px;text-align:center;';
  const xSep = document.createElement('span');
  xSep.textContent = '×';
  xSep.style.cssText = 'color:#999;font-weight:bold;';
  const heightInp = document.createElement('input');
  heightInp.type = 'number'; heightInp.id = 'set-res-height';
  heightInp.min = '240'; heightInp.max = '4320';
  heightInp.value = String(currentResolution.height);
  heightInp.style.cssText = 'width:70px;text-align:center;';
  customWrap.appendChild(widthInp);
  customWrap.appendChild(xSep);
  customWrap.appendChild(heightInp);
  customRow.appendChild(customWrap);
  resGroup.appendChild(customRow);

  resSel.addEventListener('change', () => {
    const cr = document.getElementById('custom-res-row');
    if (resSel.value === 'custom') {
      cr.style.display = 'flex';
    } else {
      cr.style.display = 'none';
      const [w, h] = resSel.value.split('x').map(Number);
      widthInp.value = String(w);
      heightInp.value = String(h);
    }
  });

  output.body.appendChild(resGroup);

  // ─ Frame Rate group ─
  const fpsGroup = document.createElement('div');
  fpsGroup.className = 'settings-group';
  fpsGroup.innerHTML = '<h3>Frame Rate</h3>';

  const fpsRow = document.createElement('div');
  fpsRow.className = 'settings-row';
  fpsRow.innerHTML = '<label>FPS</label>';
  const fpsSel = document.createElement('select');
  fpsSel.id = 'set-framerate';
  [
    { value: 15,     label: '15 fps' },
    { value: 23.976, label: '23.976 fps (NTSC Film)' },
    { value: 24,     label: '24 fps' },
    { value: 25,     label: '25 fps (PAL)' },
    { value: 29.97,  label: '29.97 fps (NTSC)' },
    { value: 30,     label: '30 fps' },
    { value: 50,     label: '50 fps (PAL)' },
    { value: 59.94,  label: '59.94 fps (NTSC)' },
    { value: 60,     label: '60 fps' },
  ].forEach(({ value, label }) => {
    const opt = document.createElement('option');
    opt.value = String(value);
    opt.textContent = label;
    if (currentFrameRate === value) opt.selected = true;
    fpsSel.appendChild(opt);
  });
  fpsRow.appendChild(fpsSel);
  fpsGroup.appendChild(fpsRow);

  const fpsNote = document.createElement('div');
  fpsNote.className = 'settings-note';
  fpsNote.textContent = 'Auto-saved. Changes take effect on next stream start.';
  fpsGroup.appendChild(fpsNote);

  output.body.appendChild(fpsGroup);

  body.appendChild(output.section);

  // ════════════════════════════════════════
  // SECTION 2b — Encoding
  // ════════════════════════════════════════
  const enc = makeSettingsSection('Encoding');

  // --- H.264 group ---
  const h264Group = document.createElement('div');
  h264Group.className = 'settings-group';
  h264Group.innerHTML = '<h3>H.264 Video</h3>';

  // Preset
  const presetRow = document.createElement('div');
  presetRow.className = 'settings-row';
  presetRow.innerHTML = '<label>Preset</label>';
  const presetSel = document.createElement('select');
  presetSel.id = 'set-enc-preset';
  ['ultrafast', 'superfast', 'veryfast', 'faster', 'fast', 'medium', 'slow', 'slower', 'veryslow'].forEach(p => {
    const o = document.createElement('option');
    o.value = p; o.textContent = p;
    if (currentEncoding.preset === p) o.selected = true;
    presetSel.appendChild(o);
  });
  presetRow.appendChild(presetSel);
  h264Group.appendChild(presetRow);

  // Profile
  const profileRow = document.createElement('div');
  profileRow.className = 'settings-row';
  profileRow.innerHTML = '<label>Profile</label>';
  const profileSel = document.createElement('select');
  profileSel.id = 'set-enc-profile';
  ['baseline', 'main', 'high'].forEach(p => {
    const o = document.createElement('option');
    o.value = p; o.textContent = p;
    if (currentEncoding.profile === p) o.selected = true;
    profileSel.appendChild(o);
  });
  profileRow.appendChild(profileSel);
  h264Group.appendChild(profileRow);

  // Level
  const levelRow = document.createElement('div');
  levelRow.className = 'settings-row';
  levelRow.innerHTML = '<label>Level</label>';
  const levelSel = document.createElement('select');
  levelSel.id = 'set-enc-level';
  ['3.0', '3.1', '4.0', '4.1', '4.2', '5.0', '5.1', '5.2'].forEach(l => {
    const o = document.createElement('option');
    o.value = l; o.textContent = l;
    if (currentEncoding.level === l) o.selected = true;
    levelSel.appendChild(o);
  });
  levelRow.appendChild(levelSel);
  h264Group.appendChild(levelRow);

  // Tune
  const tuneRow = document.createElement('div');
  tuneRow.className = 'settings-row';
  tuneRow.innerHTML = '<label>Tune</label>';
  const tuneSel = document.createElement('select');
  tuneSel.id = 'set-enc-tune';
  [{ v: 'zerolatency', l: 'Zero Latency' }, { v: 'film', l: 'Film' }, { v: 'animation', l: 'Animation' }, { v: 'grain', l: 'Grain' }, { v: 'stillimage', l: 'Still Image' }, { v: '', l: 'None' }].forEach(({ v, l }) => {
    const o = document.createElement('option');
    o.value = v; o.textContent = l;
    if (currentEncoding.tune === v) o.selected = true;
    tuneSel.appendChild(o);
  });
  tuneRow.appendChild(tuneSel);
  h264Group.appendChild(tuneRow);

  // Pixel format
  const pixRow = document.createElement('div');
  pixRow.className = 'settings-row';
  pixRow.innerHTML = '<label>Pixel Format</label>';
  const pixSel = document.createElement('select');
  pixSel.id = 'set-enc-pixfmt';
  [{ v: 'yuv420p', l: 'yuv420p (standard)' }, { v: 'yuv444p', l: 'yuv444p (better color)' }].forEach(({ v, l }) => {
    const o = document.createElement('option');
    o.value = v; o.textContent = l;
    if (currentEncoding.pixelFormat === v) o.selected = true;
    pixSel.appendChild(o);
  });
  pixRow.appendChild(pixSel);
  h264Group.appendChild(pixRow);

  enc.body.appendChild(h264Group);

  // --- Bitrate group ---
  const brGroup = document.createElement('div');
  brGroup.className = 'settings-group';
  brGroup.innerHTML = '<h3>Bitrate</h3>';

  // Video bitrate
  const vbrRow = document.createElement('div');
  vbrRow.className = 'settings-row';
  vbrRow.innerHTML = '<label>Video (kbps)</label>';
  const vbrInp = document.createElement('input');
  vbrInp.type = 'number'; vbrInp.id = 'set-enc-vbr';
  vbrInp.min = '500'; vbrInp.max = '50000';
  vbrInp.value = String(currentEncoding.videoBitrate);
  vbrRow.appendChild(vbrInp);
  brGroup.appendChild(vbrRow);

  // Max bitrate
  const mbrRow = document.createElement('div');
  mbrRow.className = 'settings-row';
  mbrRow.innerHTML = '<label>Max (kbps)</label>';
  const mbrInp = document.createElement('input');
  mbrInp.type = 'number'; mbrInp.id = 'set-enc-mbr';
  mbrInp.min = '500'; mbrInp.max = '60000';
  mbrInp.value = String(currentEncoding.maxBitrate);
  mbrRow.appendChild(mbrInp);
  brGroup.appendChild(mbrRow);

  // Buffer size
  const bufRow = document.createElement('div');
  bufRow.className = 'settings-row';
  bufRow.innerHTML = '<label>Buffer (kbps)</label>';
  const bufInp = document.createElement('input');
  bufInp.type = 'number'; bufInp.id = 'set-enc-buf';
  bufInp.min = '1000'; bufInp.max = '100000';
  bufInp.value = String(currentEncoding.bufferSize);
  bufRow.appendChild(bufInp);
  brGroup.appendChild(bufRow);

  // Audio bitrate
  const abrRow = document.createElement('div');
  abrRow.className = 'settings-row';
  abrRow.innerHTML = '<label>Audio (kbps)</label>';
  const abrSel = document.createElement('select');
  abrSel.id = 'set-enc-abr';
  [64, 96, 128, 192, 256, 320].forEach(b => {
    const o = document.createElement('option');
    o.value = String(b); o.textContent = `${b} kbps`;
    if (currentEncoding.audioBitrate === b) o.selected = true;
    abrSel.appendChild(o);
  });
  abrRow.appendChild(abrSel);
  brGroup.appendChild(abrRow);

  enc.body.appendChild(brGroup);

  // --- Keyframe group ---
  const gopGroup = document.createElement('div');
  gopGroup.className = 'settings-group';
  gopGroup.innerHTML = '<h3>Keyframe</h3>';

  const gopRow = document.createElement('div');
  gopRow.className = 'settings-row';
  gopRow.innerHTML = '<label>GOP Size</label>';
  const gopInp = document.createElement('input');
  gopInp.type = 'number'; gopInp.id = 'set-enc-gop';
  gopInp.min = '0'; gopInp.max = '600';
  gopInp.value = String(currentEncoding.gopSize);
  gopRow.appendChild(gopInp);
  gopGroup.appendChild(gopRow);

  const gopNote = document.createElement('div');
  gopNote.className = 'settings-note';
  gopNote.textContent = 'Keyframe interval in frames. 0 = automatic (1 second).';
  gopGroup.appendChild(gopNote);

  enc.body.appendChild(gopGroup);

  const encNote = document.createElement('div');
  encNote.className = 'settings-note';
  encNote.textContent = 'Auto-saved. Changes take effect on next stream start.';
  enc.body.appendChild(encNote);

  body.appendChild(enc.section);

  // ── Auto-save for Stream Output & Encoding ──
  function collectAndSaveOutputConfig() {
    const resSelVal = resSel.value;
    let w, h;
    if (resSelVal === 'custom') {
      w = Math.max(320, Math.min(7680, parseInt(widthInp.value) || currentResolution.width));
      h = Math.max(240, Math.min(4320, parseInt(heightInp.value) || currentResolution.height));
    } else {
      [w, h] = resSelVal.split('x').map(Number);
    }
    const fps = parseFloat(fpsSel.value) || currentFrameRate;

    const encoding = {
      preset: presetSel.value,
      profile: profileSel.value,
      level: levelSel.value,
      tune: tuneSel.value,
      pixelFormat: pixSel.value,
      videoBitrate: Math.max(500, parseInt(vbrInp.value) || currentEncoding.videoBitrate),
      maxBitrate: Math.max(500, parseInt(mbrInp.value) || currentEncoding.maxBitrate),
      bufferSize: Math.max(1000, parseInt(bufInp.value) || currentEncoding.bufferSize),
      audioBitrate: parseInt(abrSel.value) || currentEncoding.audioBitrate,
      gopSize: Math.max(0, parseInt(gopInp.value) || 0),
    };

    currentResolution = { width: w, height: h };
    currentFrameRate = fps;
    currentEncoding = encoding;

    api.send('save-output-config', { resolution: { width: w, height: h }, frameRate: fps, encoding });
  }

  const debouncedSave = debounce(collectAndSaveOutputConfig, 600);

  // Select-based controls save immediately, number inputs are debounced
  [resSel, fpsSel, presetSel, profileSel, levelSel, tuneSel, pixSel, abrSel].forEach(el => {
    el.addEventListener('change', collectAndSaveOutputConfig);
  });
  [widthInp, heightInp, vbrInp, mbrInp, bufInp, gopInp].forEach(el => {
    el.addEventListener('input', debouncedSave);
    el.addEventListener('change', collectAndSaveOutputConfig);
  });

  // ════════════════════════════════════════
  // SECTION 3 — Speech Recognition Model
  // ════════════════════════════════════════
  const whisper = makeSettingsSection('Speech Recognition Model');
  whisper.section.classList.add('full-width');
  const whisperSection = whisper.section;
  const whisperBody = whisper.body;

  const whisperNote = document.createElement('div');
  whisperNote.className = 'settings-note';
  whisperNote.textContent = 'Select a whisper.cpp model for subtitle generation. Larger models are more accurate but slower.';
  whisperBody.appendChild(whisperNote);

  const whisperContainer = document.createElement('div');
  whisperContainer.id = 'whisper-models-container';
  whisperContainer.style.display = 'flex';
  whisperContainer.style.flexDirection = 'column';
  whisperContainer.style.gap = '4px';
  whisperBody.appendChild(whisperContainer);

  renderWhisperModels(whisperContainer);

  whisperSection.appendChild(whisperBody);
  body.appendChild(whisperSection);

  wrap.appendChild(body);
  area.appendChild(wrap);
}

function applySettings() {
  const countInp = document.getElementById('set-stream-count');
  const apiInp = document.getElementById('set-api-port');
  const rtmpInp = document.getElementById('set-rtmp-port');
  const msgEl = document.getElementById('settings-msg');
  const saveBtn = document.getElementById('settings-save-btn');

  const streamCount = Math.max(1, Math.min(12, parseInt(countInp.value) || streams.length));
  const apiPort = parseInt(apiInp.value) || currentApiPort;
  const rtmpPort = parseInt(rtmpInp.value) || currentRtmpPort;

  // Validate ports
  if (apiPort < 1024 || apiPort > 65535 || rtmpPort < 1024 || rtmpPort > 65535) {
    if (msgEl) { msgEl.className = 'settings-msg err'; msgEl.textContent = 'Ports must be between 1024 and 65535.'; }
    return;
  }
  if (apiPort === rtmpPort) {
    if (msgEl) { msgEl.className = 'settings-msg err'; msgEl.textContent = 'API and RTMP ports must be different.'; }
    return;
  }

  // Confirm if reducing streams that are active
  const activeAbove = streams.filter(s => s.id > streamCount && (s.status === 'running' || s.status === 'starting'));
  if (activeAbove.length > 0) {
    const names = activeAbove.map(s => `Stream ${s.id}`).join(', ');
    if (!confirm(`${names} ${activeAbove.length > 1 ? 'are' : 'is'} currently running and will be stopped. Continue?`)) return;
  }

  if (saveBtn) saveBtn.disabled = true;
  if (msgEl) { msgEl.className = 'settings-msg'; msgEl.textContent = 'Applying…'; }

  api.send('update-settings', { streamCount, apiPort, rtmpPort });
}

// ── Build a display-friendly RTMP URL using the LAN IP ──
function displayUrl(s) {
  if (!hostIP) return s.rtmpUrl || '';
  return `rtmp://${hostIP}:${currentRtmpPort}/live/${s.streamName}`;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Init request with retry ──
function requestInit() {
  if (initReceived) return;
  if (api) api.send('request-init');
  setTimeout(() => { if (!initReceived) requestInit(); }, 500);
}
requestInit();
</script>
